services:
  - type: web
    name: likila-travel
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn likila_project.wsgi"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: likila-db
          property: connectionString

databases:
  - name: likila-db
    databaseName: likila
    user: likila
    plan: free
